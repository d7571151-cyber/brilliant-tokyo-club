<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRILLIANT TOKYO CLUB — セッション予約</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --white:#fafaf8;
  --paper:#ffffff;
  --black:#0e0e0e;
  --gold:#a8843a;
  --gray:#f3f1ec;
  --gray2:#ebe8e1;
  --muted:#8a857a;
  --border:#e3e0d8;
}
body{background:var(--white);color:var(--black);font-family:'Space Grotesk',sans-serif;line-height:1.7;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:0 1.5rem}

.hero{padding:4rem 0 3rem;text-align:center;border-bottom:1px solid var(--border)}
.eyebrow{font-size:10px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.hero-title{font-size:30px;font-weight:700;letter-spacing:0.01em;margin-bottom:0.5rem}
.hero-sub{font-size:13px;letter-spacing:0.05em;color:var(--muted)}

.venue-banner{background:var(--gray);border-bottom:1px solid var(--border);padding:1.5rem 0}
.venue-banner-inner{display:flex;justify-content:space-between;align-items:center;max-width:560px;margin:0 auto;padding:0 1.5rem}
.venue-label{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:0.3rem}
.venue-name{font-size:18px;font-weight:600;color:var(--black)}
.venue-month{font-size:13px;color:var(--gold);font-weight:500}

.sessions{padding:2rem 1.5rem}
.session-card{background:var(--paper);border:1px solid var(--border);border-radius:6px;margin-bottom:1rem;overflow:hidden}
.session-header{padding:1.3rem 1.3rem 1rem;border-bottom:1px solid var(--border)}
.session-date{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem}
.session-time{font-weight:700;font-size:32px;letter-spacing:0.01em;line-height:1;color:var(--black);display:flex;align-items:baseline;gap:10px}
.session-time .time-sep{font-size:24px;color:var(--muted);font-weight:400}
.session-time .time-end{font-size:32px;color:var(--black);font-weight:700}
.session-meta{margin-top:0.7rem;display:flex;gap:1.5rem;flex-wrap:wrap}
.session-meta-item{font-size:11px;color:var(--muted);letter-spacing:0.03em;display:flex;align-items:center;gap:5px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}

.capacity-area{padding:1rem 1.3rem}
.capacity-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem}
.capacity-label{font-size:10px;color:var(--muted);letter-spacing:0.1em}
.capacity-count{font-size:11px;font-weight:700;color:var(--black)}
.capacity-bar{height:3px;background:var(--gray2);border-radius:2px;overflow:hidden;margin-bottom:1rem}
.capacity-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.5s ease}
.capacity-fill.full{background:#c0524a}

.action-area{padding:0 1.3rem 1.3rem;display:flex;gap:0.6rem}
.btn{flex:1;padding:0.85rem;font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;border:none;border-radius:4px;cursor:pointer;transition:all 0.2s}
.btn-join{background:var(--black);color:var(--white)}
.btn-join:hover{background:var(--gold)}
.btn-joined{background:transparent;color:var(--gold);border:1px solid var(--gold);cursor:default}
.btn-full{background:var(--gray2);color:var(--muted);cursor:default}
.btn-loading{background:var(--gray2);color:var(--muted);cursor:default}

.modal-overlay{position:fixed;inset:0;background:rgba(14,14,14,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--paper);width:100%;max-width:480px;border-radius:10px 10px 0 0;padding:2rem 1.5rem;transform:translateY(20px);transition:transform 0.3s;border-top:1px solid var(--border)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-weight:700;font-size:22px;letter-spacing:0.01em;margin-bottom:0.3rem}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:1.5rem;letter-spacing:0.03em}
.modal-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem}
.modal-input{width:100%;background:var(--gray);border:1px solid var(--border);border-radius:4px;padding:0.8rem 1rem;color:var(--black);font-family:'Space Grotesk',sans-serif;font-size:14px;margin-bottom:1rem;outline:none;transition:border-color 0.2s}
.modal-input:focus{border-color:var(--gold)}
.modal-actions{display:flex;gap:0.6rem;margin-top:0.5rem}
.btn-confirm{flex:2;padding:0.9rem;background:var(--black);color:var(--white);font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;border:none;border-radius:4px;cursor:pointer}
.btn-confirm:disabled{background:var(--gray2);color:var(--muted)}
.btn-close{flex:1;padding:0.9rem;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;border:1px solid var(--border);border-radius:4px;cursor:pointer}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--black);color:var(--white);font-size:11px;letter-spacing:0.1em;font-weight:600;padding:0.8rem 1.5rem;border-radius:4px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;max-width:80%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.footer{padding:3rem 0;text-align:center}
.footer-logo{font-size:13px;letter-spacing:0.15em;color:var(--muted)}
.footer-nav{display:flex;justify-content:center;gap:1.5rem;margin-top:1rem}
.footer-nav a{font-size:11px;letter-spacing:0.1em;color:var(--muted);text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px}
.footer-nav a:hover{color:var(--gold);border-bottom-color:var(--gold)}
</style>
</head>
<body>

<div class="hero">
  <div class="wrap">
    <div class="eyebrow">Tokyo · Private Membership</div>
    <div class="hero-title">BRILLIANT TOKYO CLUB</div>
    <div class="hero-sub">セッション予約</div>
  </div>
</div>

<div class="venue-banner">
  <div class="venue-banner-inner">
    <div>
      <div class="venue-label">Venue</div>
      <div class="venue-name">ヒルトン東京（新宿）</div>
    </div>
    <div class="venue-month">2026年6-7月</div>
  </div>
</div>

<div class="sessions" id="session-list">
  <div style="text-align:center;padding:2rem;color:var(--muted);font-size:13px">読み込み中...</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">参加登録</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-label">お名前</div>
    <input class="modal-input" id="name-input" type="text" placeholder="山田 太郎">
    <div class="modal-label">LINE名 / 連絡先</div>
    <input class="modal-input" id="contact-input" type="text" placeholder="@yourline">
    <div class="modal-actions">
      <button class="btn-confirm" id="confirm-btn" onclick="confirmJoin()">参加を確定する</button>
      <button class="btn-close" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="footer">
  <div class="footer-logo">BRILLIANT TOKYO CLUB</div>
  <div class="footer-nav"><a href="/">会員登録</a><a href="/rules.html">ルール・用語集</a><a href="/locations.html">開催場所</a></div>
</div>

<script>
// ↓ Google Apps Script ウェブアプリURLをここに貼り付け
const GAS_URL = "https://script.google.com/macros/s/AKfycbwand_6KaUCOFvX-aVBc2atZR7y3YgoZRmm3TIKcLEPqSgVFyH_gHIJmNjT2JJBL305iQ/exec";

// フォールバック用の初期データ（GAS未接続時や通信エラー時に表示）
const fallbackSessions = [
  { id:'s0', date:'6/28（日）', time:'19:00', endTime:'21:00', location:'ヒルトン東京（新宿）', capacity:4, count:4 },
  { id:'s1', date:'7/10（金）', time:'20:00', endTime:'21:00', location:'ヒルトン東京（新宿）', capacity:8, count:8 },
  { id:'s2', date:'7/18（土）', time:'20:00', endTime:'21:00', location:'ヒルトン東京（新宿）', capacity:8, count:6 },
  { id:'s3', date:'7/19（日）', time:'19:00', endTime:'21:00', location:'ヒルトン東京（新宿）', capacity:8, count:3 },
  { id:'s4', date:'7/25（土）', time:'20:00', endTime:'21:00', location:'ヒルトン東京（新宿）', capacity:8, count:7 },
];

let sessions = [];
let pendingSession = null;
let joined = JSON.parse(localStorage.getItem('btc_joined_v2') || '{}');

async function loadSessions() {
  if (GAS_URL.indexOf('PASTE_') === 0) {
    // GAS未設定の場合はフォールバックデータを使う
    sessions = fallbackSessions;
    render();
    return;
  }
  try {
    const res = await fetch(GAS_URL + '?action=getSessions&_=' + Date.now(), { cache: 'no-store' });
    const data = await res.json();
    if (data.result === 'success') {
      sessions = data.sessions;
    } else {
      sessions = fallbackSessions;
    }
  } catch (err) {
    sessions = fallbackSessions;
  }
  render();
}

function render() {
  const list = document.getElementById('session-list');
  list.innerHTML = sessions.map(s => sessionCard(s)).join('');
}

function sessionCard(s) {
  const capacity = Number(s.capacity) || 0;
  const count = Number(s.count) || 0;
  const isFull = capacity > 0 && count >= capacity;
  const isJoined = joined[s.id];
  const pct = capacity > 0 ? Math.min(100, (count / capacity) * 100) : 0;

  let actionBtn = '';
  if (isJoined) {
    actionBtn = `<button class="btn btn-joined">参加済み ✓</button>`;
  } else if (isFull) {
    actionBtn = `<button class="btn btn-full">満員</button>`;
  } else {
    actionBtn = `<button class="btn btn-join" onclick="openModal('${s.id}')">参加する</button>`;
  }

  return `
  <div class="session-card" id="card-${s.id}">
    <div class="session-header">
      <div class="session-date">${s.date}</div>
      <div class="session-time">${s.time}${s.endTime ? `<span class="time-sep">–</span><span class="time-end">${s.endTime}</span>` : ''}</div>
      <div class="session-meta">
        <div class="session-meta-item"><div class="dot"></div>${s.location}</div>
        <div class="session-meta-item">キャンセル前日まで</div>
      </div>
    </div>
    <div class="capacity-area">
      <div class="capacity-row">
        <span class="capacity-label">参加者</span>
        <span class="capacity-count">${count} / ${capacity}</span>
      </div>
      <div class="capacity-bar"><div class="capacity-fill ${isFull?'full':''}" style="width:${pct}%"></div></div>
    </div>
    <div class="action-area">${actionBtn}</div>
  </div>`;
}

function openModal(id) {
  pendingSession = sessions.find(s => s.id === id);
  document.getElementById('modal-title').textContent = '参加登録';
  document.getElementById('modal-sub').textContent =
    `${pendingSession.date} ${pendingSession.time} — ${pendingSession.location}`;
  document.getElementById('name-input').value = '';
  document.getElementById('contact-input').value = '';
  document.getElementById('confirm-btn').disabled = false;
  document.getElementById('confirm-btn').textContent = '参加を確定する';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  pendingSession = null;
}

async function confirmJoin() {
  const name = document.getElementById('name-input').value.trim();
  const contact = document.getElementById('contact-input').value.trim();
  if (!name) { showToast('お名前を入力してください'); return; }
  if (!pendingSession) return;

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  if (GAS_URL.indexOf('PASTE_') === 0) {
    // GAS未設定時はローカルのみ更新
    pendingSession.count += 1;
    joined[pendingSession.id] = true;
    localStorage.setItem('btc_joined_v2', JSON.stringify(joined));
    closeModal();
    render();
    showToast('参加を受け付けました ✓（テスト表示）');
    return;
  }

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'book', sessionId: pendingSession.id, name: name, contact: contact })
    });
    const data = await res.json();

    if (data.result === 'success') {
      pendingSession.count = data.newCount;
      joined[pendingSession.id] = true;
      localStorage.setItem('btc_joined_v2', JSON.stringify(joined));
      closeModal();
      render();
      showToast('参加を受け付けました ✓');
    } else if (data.result === 'full') {
      closeModal();
      await loadSessions();
      showToast('申し訳ありません、満員になりました');
    } else {
      showToast('送信に失敗しました。もう一度お試しください');
      btn.disabled = false;
      btn.textContent = '参加を確定する';
    }
  } catch (err) {
    showToast('通信エラーが発生しました');
    btn.disabled = false;
    btn.textContent = '参加を確定する';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadSessions();
</script>
</body>
</html>
